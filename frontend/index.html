<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>gpt2-inference-engine</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="bgCanvas"></canvas>

  <div class="container">
    <div class="header">
      <div class="badge">GPT-2 124M</div>
      <h1>gpt2<span class="accent">.</span>inference</h1>
    </div>

    <div class="settings-bar">
      <label>Strategy
        <select id="strategy">
          <option value="top_k" selected>Top-K</option>
          <option value="top_p">Top-P (nucleus)</option>
          <option value="temperature">Temperature</option>
          <option value="greedy">Greedy</option>
        </select>
      </label>
      <label>Max tokens
        <input type="number" id="maxTokens" value="60" min="10" max="200">
      </label>
      <label>Temperature
        <input type="range" id="temperature" min="0.1" max="1.5" step="0.1" value="0.8">
        <span id="tempValue">0.8</span>
      </label>
    </div>

    <div class="chat-window" id="chatWindow">
      <div class="empty-state">Type a prompt below to begin generating.</div>
    </div>

    <div class="input-bar">
      <input type="text" id="promptInput" placeholder="Type a prompt and press Enter...">
      <button id="sendBtn">Generate</button>
    </div>
  </div>

  <script src="background.js"></script>
  <script src="chat.js"></script>
</body>
</html>
